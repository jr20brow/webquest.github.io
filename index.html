<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Start Your Adventure</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <header class="d-flex justify-content-between align-items-center px-4 py-3">
    <h1 class="m-0">Web Quest</h1>
    <div id="health" class="header-health">❤️ Health: 100</div>
    <button id="permanent-reset" class="btn-reset">Restart Game</button>
  </header>
  <hr class="m-0" />

  <div id="game-background">
    <div id="game-container" class="container-md py-4">
      <div id="game-visual" class="mb-3">
        <img id="visual-element" src="assets/Placeholder-1.jpg" alt="Game Scene" class="img-fluid">
      </div>
      <div id="game-text" class="fs-5 mb-3">Loading adventure...</div>
      <hr />
      <div id="actions" class="d-flex flex-wrap justify-content-center gap-2">
      </div>
    </div>
  </div>

  <!-- Bootstrap JS bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- type="module" is required for ES module imports to work -->
  <script type="module" src="game.js" defer></script>
</body>

</html>
